# application.properties
# Author: Edoardo Sabatini
# Date: 2026-05-09
# Company: few-payments
# Description: Configuration file for the transaction service application.
#              12-Factor III — config comes from the environment, never hardcoded.
#              All ${VAR} placeholders are resolved from the OS environment (loaded from .env).

spring.application.name=transaction-service

# ── Docker Compose (disabled: we start the DB manually via docker compose up) ──
spring.docker.compose.enabled=false

# ── DataSource — values injected from .env ──────────────────────────────────────
# POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD must be exported before running.
spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────────────────────
# ddl-auto=validate: Hibernate checks that the DB matches the entity — schema.sql owns the DDL.
# Switch to 'update' only during early development.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── SQL initialisation — schema.sql runs on every startup ───────────────────────
# 'always' ensures CREATE TABLE IF NOT EXISTS is idempotent across restarts.
spring.sql.init.mode=always

# ── Actuator — expose health endpoint for readiness checks ──────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
